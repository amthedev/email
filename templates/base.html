<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Email Manager</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--accent:#6c63ff;--accent2:#00d4aa;--text:#e2e8f0;--muted:#64748b;--danger:#ef4444;--warn:#f59e0b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px}
  .topbar .logo{font-weight:700;font-size:16px;color:var(--accent);white-space:nowrap}
  .topbar form{display:flex;gap:8px;flex:1;max-width:500px}
  .topbar input{flex:1;background:#0f1117;border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:6px;font-size:13px}
  .topbar input:focus{outline:2px solid var(--accent);border-color:transparent}
  .topbar .btn-sm{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;white-space:nowrap}
  .topbar .btn-sm:hover{opacity:.85}
  .topbar nav{display:flex;gap:12px;margin-left:auto}
  .topbar nav a{color:var(--muted);font-size:13px}
  .topbar nav a:hover{color:var(--text)}

  .layout{display:flex;height:calc(100vh - 49px)}

  .sidebar{width:280px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
  .sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .sidebar-header h3{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .create-btn{background:var(--accent);color:#fff;border:none;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px}
  .create-btn:hover{opacity:.85}

  .account-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:block}
  .account-item:hover,.account-item.active{background:rgba(108,99,255,.12)}
  .account-item.active{border-left:3px solid var(--accent)}
  .acc-addr{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acc-label{font-size:11px;color:var(--accent2);margin-top:2px}
  .acc-meta{display:flex;gap:8px;margin-top:4px}
  .badge{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600}
  .badge-unread{background:var(--accent);color:#fff}
  .badge-total{background:var(--border);color:var(--muted)}

  .main{flex:1;overflow-y:auto;padding:20px}

  .stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 20px;flex:1;min-width:120px}
  .stat-card .num{font-size:24px;font-weight:700;color:var(--accent)}
  .stat-card .label{font-size:12px;color:var(--muted);margin-top:2px}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .panel-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .panel-header h2{font-size:15px;font-weight:600}
  .panel-body{padding:18px}

  .msg-list{}
  .msg-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;cursor:pointer}
  .msg-item:hover{background:rgba(255,255,255,.03)}
  .msg-item.unread .msg-subject{font-weight:700;color:var(--text)}
  .msg-item .msg-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px}
  .msg-item.read .msg-dot{background:transparent}
  .msg-info{flex:1;min-width:0}
  .msg-from{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .msg-subject{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .msg-preview{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .msg-date{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}

  .msg-full{padding:20px}
  .msg-full .mf-header{margin-bottom:16px}
  .msg-full .mf-subject{font-size:18px;font-weight:700;margin-bottom:8px}
  .msg-full .mf-meta{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px}
  .msg-full .mf-body{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:16px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word}

  .form-inline{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .form-inline input,.form-inline select{background:#0f1117;border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:6px;font-size:13px}
  .form-inline input:focus{outline:2px solid var(--accent)}

  .btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{opacity:.85}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-danger:hover{opacity:.85}
  .btn-secondary{background:var(--border);color:var(--text)}
  .btn-secondary:hover{background:#3a3d4a}
  .btn-success{background:var(--accent2);color:#000}

  .empty{text-align:center;padding:40px;color:var(--muted)}

  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;width:100%;max-width:420px}
  .modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
  .modal .form-group{margin-bottom:14px}
  .modal label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .modal input{width:100%;background:#0f1117;border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px}
  .modal input:focus{outline:2px solid var(--accent)}
  .modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

  .copy-btn{font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}
  .copy-btn:hover{color:var(--text)}

  .search-results .sr-item{padding:12px 16px;border-bottom:1px solid var(--border)}
  .search-results .sr-account{font-size:11px;color:var(--accent2)}
  .search-results .sr-subject{font-weight:600;margin:3px 0}
  .search-results .sr-from{font-size:11px;color:var(--muted)}

  @media(max-width:640px){
    .sidebar{display:none}
    .stats{gap:8px}
    .stat-card{padding:10px 14px}
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">📬 Email Manager</span>
  <form action="/" method="get">
    <input name="q" placeholder="Buscar contas..." value="{{ q|default('') }}"/>
    <button class="btn-sm" type="submit">Buscar</button>
  </form>
  <nav>
    <a href="/">Contas</a>
    <a href="/search">Buscar emails</a>
  </nav>
</div>

{% block body %}{% endblock %}

<div class="modal-bg" id="createModal">
  <div class="modal">
    <h3>Criar novo email</h3>
    <form method="post" action="/create">
      <div class="form-group">
        <label>Endereço (deixe vazio para gerar automaticamente)</label>
        <input name="address" placeholder="usuario@wshu.net"/>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input name="password" value="Senha@1234"/>
      </div>
      <div class="actions">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary">Criar</button>
      </div>
    </form>
  </div>
</div>

<script>
function openModal(){document.getElementById('createModal').classList.add('open')}
function closeModal(){document.getElementById('createModal').classList.remove('open')}
document.getElementById('createModal').addEventListener('click',function(e){if(e.target===this)closeModal()})

function copyText(text){
  navigator.clipboard.writeText(text).then(()=>{
    const el=event.target; el.textContent='Copiado!'; setTimeout(()=>el.textContent='Copiar',1500)
  })
}
</script>
</body>
</html>
